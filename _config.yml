# Site settings — https://jekyllrb.com/docs/configuration/
title: "Isaque Bressy"
tagline: "Blog e projetos"
email: isaque@bressy.com.br
description: >-
  Site pessoal com artigos, notas técnicas e portfólio de projetos.
lang: pt_BR

# URL: use seu domínio customizado ou https://<user>.github.io
url: "https://isaque.bressy.com.br"
baseurl: ""

# Subsites fora do Jekyll (mega/, droppingballs/, todo/): pastas na raiz com HTML
# sem front matter são copiadas literais para _site; mantenha CSS/JS/img relativos
# à pasta (ex. href="style.css" em mega/index.html → /mega/style.css no ar).
# Não inicie o nome da pasta com _ (é reservado). Se precisar de front matter no HTML,
# o Liquid interpreta {{ … }} — conflite com Angular/Vue: use {% raw %}…{% endraw %}
# ou render_with_liquid: false (Jekyll 4+).

author:
  name: Isaque Bressy
  email: isaque@bressy.com.br
  twitter: isaquebressy

twitter:
  username: isaquebressy
  card: summary

social:
  name: Isaque Bressy
  links:
    - https://twitter.com/isaquebressy
    - https://github.com/isaquebressy
    - https://www.facebook.com/isaque.bressy

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

# Arquivo .html explícito — evita 404 no WEBrick/local quando /pasta/ não resolve index.html
permalink: /blog/:year/:month/:day/:title:output_ext

collections:
  work:
    output: true
    permalink: /work/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Isaque Bressy"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - Gemfile.lock.old
  - README.md
